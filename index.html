<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/// DISCONNECTED ///</title>
    <!-- Importing an Occult Serif & a creepy Terminal Monospace font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #050505;
            color: #8b0000;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 1. THE CRT SCANLINE OVERLAY */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        /* 2. THE BLOOD VIGNETTE (Pulsing dark edges) */
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            box-shadow: inset 0 0 120px rgba(110, 0, 0, 0.6);
            z-index: 9;
            pointer-events: none;
            animation: pulse-vignette 6s infinite alternate;
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 20px;
            max-width: 600px;
        }

        /* 3. DYING FLUORESCENT FLICKER TITLE */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #d10000;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            animation: bulb-flicker 5s infinite;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #4a4a4a;
            letter-spacing: 0.4em;
            margin-bottom: 40px;
        }

        #typewriter-text {
            color: #a3a3a3;
            font-size: 0.95rem;
            min-height: 40px;
            margin-bottom: 50px;
            line-height: 1.5;
        }

        /* THE ENTRANCE GATE */
        .enter-btn {
            display: inline-block;
            color: #d10000;
            text-decoration: none;
            border: 1px solid #570000;
            padding: 12px 35px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: all 0.2s ease-in-out;
            background: rgba(20, 0, 0, 0.3);
        }

        .enter-btn:hover {
            background-color: #9e0000;
            color: #000000;
            border-color: #ff0000;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
            cursor: pointer;
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 0.1em;
        }

        /* KEYFRAME ANIMATIONS */
        @keyframes bulb-flicker {
            0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% {
                opacity: 0.99;
                text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            }
            20%, 21.999%, 63%, 63.999%, 65%, 69.999% {
                opacity: 0.15;
                text-shadow: none;
            }
        }

        @keyframes pulse-vignette {
            0% { box-shadow: inset 0 0 100px rgba(50, 0, 0, 0.8); }
            100% { box-shadow: inset 0 0 180px rgba(160, 0, 0, 0.9); }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="container">
        <div class="subtitle">EST. 1998 // GATEWAY</div>
        <h1>DEATH & HELL</h1>
        
        <!-- JS will type inside this paragraph -->
        <p id="typewriter-text"></p>

        <a href="main-site.html" class="enter-btn">[ PROCEED ]</a>
    </div>

    <footer>SESSION ID: 0x992B &bull; IP LOGGED</footer>

    <script>
        const message = "You were not invited here. Turn back while your curiosity is still an innocent thing.";
        const destination = document.getElementById("typewriter-text");
        let i = 0;

        function hauntedTypewriter() {
            if (i < message.length) {
                destination.innerHTML += message.charAt(i);
                i++;
                // Randomized delay makes the "typist" feel human/unstable
                let randomSpeed = Math.floor(Math.random() * 60) + 30; 
                setTimeout(hauntedTypewriter, randomSpeed);
            }
        }

        // Slight pause before the text starts speaking to them
        setTimeout(hauntedTypewriter, 1000);
    </script>

</body>
</html>
